services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.4 # client é 2.22.5 (uv.lock), mas 2.22.5 não tem imagem publicada
    # backend sqlite: o Model Registry (Staging/Production) exige store com banco;
    # o file store puro não suporta registro de modelos.
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --artifacts-destination /mlruns/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlruns

  train:
    build: .
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000 # sobrescreve o default local do Settings
    volumes:
      - ./data:/app/data # dados processados pelo `dvc repro` no host
      - ./models:/app/models # checkpoint sai do container para o host

volumes:
  mlflow-data:
