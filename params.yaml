# Hiperparâmetros do pipeline — rastreados pelo DVC (dvc.yaml -> params:).
# Mudar um valor aqui invalida só os stages que dependem dele no próximo `dvc repro`.

featurize:
  implicit_threshold: 4.0 # rating >= threshold vira interação positiva (label 1)

# Config vencedora do tuning (python -m recsys.models.tune, 3 runs MLflow):
# val NDCG@10 0.0320 vs 0.0214 da config original (emb 64, 128/64, 8 épocas).
train:
  embedding_dim: 128
  hidden_dims: [256, 128]
  dropout: 0.3
  batch_size: 1024
  learning_rate: 0.001
  epochs: 20
  patience: 3 # early stopping: épocas sem melhora no NDCG@10 de validação
  negatives_per_positive: 4 # amostragem de negativos por positivo no treino

evaluate:
  top_k: 10
