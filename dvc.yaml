stages:
  preprocess:
    cmd: python -m recsys.data.preprocess
    deps:
      - data/raw/ml-1m/ratings.dat
      - src/recsys/data/preprocess.py
    outs:
      - data/interim/clean.parquet

  feature_eng:
    cmd: python -m recsys.features.build
    deps:
      - data/interim/clean.parquet
      - src/recsys/features/build.py
      - src/recsys/features/strategies.py
    params:
      - featurize.implicit_threshold
    outs:
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
      - data/processed/meta.json

  train:
    cmd: python -m recsys.models.train
    deps:
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/meta.json
      - src/recsys/models/mlp.py
      - src/recsys/models/train.py
      - src/recsys/evaluation/metrics.py
    params:
      - train
    outs:
      - models/recsys.pt

  evaluate:
    cmd: python -m recsys.evaluation.evaluate
    deps:
      - models/recsys.pt
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
      - src/recsys/evaluation/evaluate.py
      - src/recsys/evaluation/metrics.py
    params:
      - evaluate.top_k
    metrics:
      - reports/metrics.json:
          cache: false
